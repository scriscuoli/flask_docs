{% extends "base.html" %}
{% block content %}
    <h2>Log In</h2>
    <form action="" method="POST">
        
        {{ form.hidden_tag() }}
        <p>
            {{ form.name.label }} {{ form.name(size=30) }}
        </p>
        <p>
            {{  form.password.label }} {{ form.password(size=30) }}
        </p>
        <p>
            {{ form.submit() }} <br>
        </p>
    </form>
{% endblock %}
